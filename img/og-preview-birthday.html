<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С Днём Рождения, Оля!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1200px;
            height: 630px;
            margin: 0;
            padding: 0;
            font-family: 'Playfair Display', serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 25%, #ffecd2 50%, #f8b4c8 75%, #e96da6 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Звёздочки на фоне */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(90, 26, 58, 0.4);
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.9; transform: scale(1.5); }
        }

        /* Падающие цветы и сердечки — как в love */
        .petals {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .petal {
            position: absolute;
            top: -40px;
            font-size: 24px;
            opacity: 0.85;
            animation: petalfall linear infinite;
        }

        @keyframes petalfall {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0.85;
            }
            100% {
                transform: translateY(670px) rotate(360deg);
                opacity: 0;
            }
        }

        /* Основной контент */
        .content {
            text-align: center;
            z-index: 10;
            position: relative;
            padding: 60px;
        }

        .heart-icon {
            font-size: 120px;
            margin-bottom: 30px;
            animation: heartPulse 2s ease-in-out infinite;
            filter: drop-shadow(0 0 30px rgba(233, 109, 166, 0.6));
        }

        @keyframes heartPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .title {
            font-size: 72px;
            font-weight: 700;
            color: #5a1a3a;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5), 1px 1px 2px rgba(255, 255, 255, 0.8);
            margin-bottom: 20px;
            line-height: 1.2;
        }

        .subtitle {
            font-size: 36px;
            font-weight: 300;
            color: #5a1a3a;
            text-shadow: 0 0 12px rgba(255, 255, 255, 0.5), 1px 1px 2px rgba(255, 255, 255, 0.6);
            margin-bottom: 15px;
        }

        .for-name {
            font-size: 28px;
            color: #5a1a3a;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.6);
            font-family: 'Montserrat', sans-serif;
        }

        /* Плавающие декоративные цветы и сердечки */
        .decorative {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .decorative-item {
            position: absolute;
            font-size: 38px;
            opacity: 0.55;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="stars" id="stars"></div>

    <!-- Падающие цветы и сердечки -->
    <div class="petals" id="petals"></div>

    <!-- Плавающие цветы и сердечки по краям -->
    <div class="decorative">
        <div class="decorative-item" style="top: 10%; left: 10%; animation-delay: 0s;">🌸</div>
        <div class="decorative-item" style="top: 20%; right: 12%; animation-delay: 1s;">💕</div>
        <div class="decorative-item" style="bottom: 18%; left: 10%; animation-delay: 2s;">🌷</div>
        <div class="decorative-item" style="bottom: 28%; right: 8%; animation-delay: 1.5s;">💖</div>
        <div class="decorative-item" style="top: 50%; left: 5%; animation-delay: 0.5s;">🌺</div>
        <div class="decorative-item" style="top: 58%; right: 6%; animation-delay: 2.5s;">❤️</div>
        <div class="decorative-item" style="top: 35%; right: 5%; animation-delay: 0.8s;">💗</div>
        <div class="decorative-item" style="bottom: 42%; left: 7%; animation-delay: 1.2s;">🌸</div>
    </div>

    <div class="content">
        <div class="heart-icon">❤️</div>
        <h1 class="title">Наши Воспоминания</h1>
        <p class="subtitle">С Днём Рождения! ✨</p>
        <p class="for-name">Оля</p>
    </div>

    <script>
        // Звёздочки
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 28; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 3 + 's';
            star.style.animationDuration = (2 + Math.random() * 2) + 's';
            starsContainer.appendChild(star);
        }

        // Падающие цветы и сердечки (как на главной love)
        const petalsContainer = document.getElementById('petals');
        const symbols = ['🌸', '💕', '🌷', '❤️', '💖', '🌺'];
        const positions = [8, 18, 28, 40, 52, 62, 72, 82, 15, 35, 55, 75];
        for (let i = 0; i < 12; i++) {
            const el = document.createElement('div');
            el.className = 'petal';
            el.textContent = symbols[i % symbols.length];
            el.style.left = positions[i] + '%';
            el.style.animationDuration = (14 + Math.random() * 6) + 's';
            el.style.animationDelay = Math.random() * 3 + 's';
            petalsContainer.appendChild(el);
        }
    </script>
</body>
</html>
